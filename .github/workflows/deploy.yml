name: Deploy Mobile Shop to AWS EC2

on:
  push:
    branches:
      - main # Cứ Push code lên nhánh main là tự động chạy

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Copy Code to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "." # Copy tất cả code
          target: "~/mobile-shop-mgmt" # Thả vào thư mục này trên Server
          rm: true # Xoá code cũ đi trước khi copy

      - name: 3. Execute Deployment on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/mobile-shop-mgmt
            
            # 1. Tạo file .env từ GitHub Secret
            echo "${{ secrets.PROD_ENV_FILE }}" > .env
            
            # 2. Build & Chạy Docker (Dùng compose v2)
            docker compose -f docker-compose.prod.yml up --build -d
            
            # 3. Dọn dẹp Image rác cho nhẹ Server
            docker image prune -f
            
            # 4. Xoá file .env đi để bảo mật (Docker lấy biến vào bộ nhớ rồi nên không cần file cứng nữa)
            rm -f .env