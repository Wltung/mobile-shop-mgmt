version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mobile-shop-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_prod_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  api:
    image: wilde123569/mobile-shop-api:latest
    container_name: mobile-shop-api-prod
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      # Sửa DB_HOST thành "mysql" (tên của service bên trên) để các container chui vào nhau
      DB_HOST: mysql 
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      SERVER_PORT: ${SERVER_PORT}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      APP_ENV: ${APP_ENV}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}

  web:
    image: wilde123569/mobile-shop-web:latest
    container_name: mobile-shop-web-prod
    restart: unless-stopped
    environment:            
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - api
  
  nginx:
    image: nginx:alpine
    container_name: mobile-shop-nginx
    restart: unless-stopped
    ports:
      - "80:80" 
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

volumes:
  mysql_prod_data: